# This workflow splits the tests to run across multiple nodes. This significantly reduces the testing time, as the
# tests require starting Octopus, MSSQL, and then running Terraform against the Octopus instance.
# See # Refer to https://github.com/hashicorp-forge/go-test-split-action for more information on how the tests are split.

name: Tests
'on':
  workflow_dispatch: {}
  pull_request:
  push:
    branches:
      - main

env:
  # Tag the test framework starts the MSSQL container with. testcontainers only
  # pulls when the image is absent locally, so a tag restored from the cache (or
  # pre-pulled) is reused without hitting the registry. Kept as a plain tag
  # because `docker load` does not restore the registry digest, so a tag@digest
  # reference would fail the local-presence check and trigger a re-pull.
  MSSQL_TAG: 2019-latest
  # Immutable digest of MSSQL_TAG as of 2026-06-10, used only to pin the pull and
  # key the cache so the build is deterministic. Re-resolve to take SQL patches.
  MSSQL_PINNED: 2019-latest@sha256:5b89fce40832a459ad4d634e9d588ae1e4496e664d9a4a9f8baeed6949b53fef

jobs:
  tests:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        parallel: [ 8 ]
        index: [ 0, 1, 2, 3, 4, 5, 6, 7 ]

    steps:
      - uses: actions/checkout@v3
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Python JWT module
        run: pip install jwt
      # In order to test git integration, we need a token generated from a JWT.
      # The first step is to generate a JWT from the GitHub App private key.
      # https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/generating-a-json-web-token-jwt-for-a-github-app#example-using-python-to-generate-a-jwt
      - name: Generate a JWT
        run: ./github-app-jwt.py >> "$GITHUB_ENV"
        env:
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
      # The next step is to generate an access token from the JWT.
      # https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/generating-an-installation-access-token-for-a-github-app#generating-an-installation-access-token
      - name: Generate an access token
        run: |
          curl \
          --silent \
          --request POST \
          --url "https://api.github.com/app/installations/${GH_APP_INSTALLATION_ID}/access_tokens" \
          --header "Accept: application/vnd.github+json" \
          --header "Authorization: Bearer ${{ env.jwt }}" \
          --header "X-GitHub-Api-Version: 2022-11-28" | jq -r '"GIT_CREDENTIAL=" + .token' > "$GITHUB_ENV"
        env:
          GH_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
      - name: Download JUnit Summary from Previous Workflow
        id: download-artifact
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow_conclusion: success
          name: junit-test-summary
          if_no_artifact_found: warn
          branch: main
      - name: Split tests
        id: test_split
        uses: hashicorp-forge/go-test-split-action@v1
        with:
          index: ${{ matrix.index }}
          total: ${{ matrix.parallel }}
          junit-summary: ./junit-test-summary.xml
      - name: Install Dependencies
        run: go get ./...
        shell: bash
      - name: Build the Terraform provider from source
        run: go build -ldflags="-s -w" -o terraform-provider-octopusdeploy
      - name: Override the location used by Terraform provider
        run: |-
          cat <<EOT >> ~/.terraformrc
          provider_installation {
              dev_overrides {
                "octopusdeploylabs/octopusdeploy" = "${{ github.workspace }}"
            }
            direct {}
          }
          EOT
      # Cache the MSSQL image as a tarball so it is loaded from cache instead of
      # re-pulled (~1.5GB) on every run. The cache key is the pinned digest, so
      # bumping MSSQL_PINNED invalidates it. The Octopus image stays on :latest
      # (mutable) and is pulled fresh each run, since tests are expected to run
      # against the newest server build.
      - name: Restore cached MSSQL image
        id: mssql-cache
        uses: actions/cache@v4
        with:
          path: ~/mssql-image.tar
          key: mssql-image-${{ env.MSSQL_PINNED }}
      - name: Load cached MSSQL image
        if: steps.mssql-cache.outputs.cache-hit == 'true'
        run: docker load --input ~/mssql-image.tar
      - name: Pre-pull container images
        run: |
          docker pull docker.packages.octopushq.com/octopusdeploy/octopusdeploy
          if [ "${{ steps.mssql-cache.outputs.cache-hit }}" != "true" ]; then
            # Pull by digest for determinism; the local tag becomes MSSQL_TAG,
            # which is what the test framework and docker save reference.
            docker pull "mcr.microsoft.com/mssql/server:${MSSQL_PINNED}"
            docker save "mcr.microsoft.com/mssql/server:${MSSQL_TAG}" --output ~/mssql-image.tar
          fi
      - name: Test
        run: |
          GOBIN=$PWD/bin go install gotest.tools/gotestsum@latest
          ./bin/gotestsum --junitfile node-summary.xml --format standard-verbose -- -run "${{ steps.test_split.outputs.run }}" -timeout 45m -parallel 3 ./... -createSharedContainer=true
        shell: bash
        env:
          LICENSE: ${{ secrets.OCTOPUS_SERVER_BASE64_LICENSE }}
          GIT_USERNAME: x-access-token
          OCTODISABLEOCTOCONTAINERLOGGING: true
          OCTOTESTSKIPINIT: true
          GOMAXPROCS: 3
          OCTOTESTVERSION: latest
          OCTOTESTIMAGEURL: docker.packages.octopushq.com/octopusdeploy/octopusdeploy
          OCTOTESTRETRYCOUNT: 0
          OCTO_MSSQLTAG: ${{ env.MSSQL_TAG }}
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-summary-${{ matrix.index }}
          path: node-summary.xml
          retention-days: 1

  tests-combine-summaries:
    if: always()
    name: Ensure Tests Pass
    needs: [ tests ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - uses: actions/setup-node@v3

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Install junit-report-merger
        run: npm install -g junit-report-merger

      - name: Merge reports
        run: >
          jrm ./junit-test-summary.xml
          "junit-test-summary-0/*.xml"
          "junit-test-summary-1/*.xml"
          "junit-test-summary-2/*.xml"
          "junit-test-summary-3/*.xml"
          "junit-test-summary-4/*.xml"
          "junit-test-summary-5/*.xml"
          "junit-test-summary-6/*.xml"
          "junit-test-summary-7/*.xml"

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-summary
          path: ./junit-test-summary.xml

      - name: Report
        uses: dorny/test-reporter@v1
        with:
          name: Go Tests
          path: junit-test-summary.xml
          reporter: java-junit
          fail-on-error: 'true'
permissions:
  id-token: write
  checks: write
  contents: write
